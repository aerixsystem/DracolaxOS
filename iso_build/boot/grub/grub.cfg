# DracolaxOS GRUB2 config v1.0 — x86_64
# Multiboot2 boot entries + chainload stubs for detected foreign OS

set default=0
set timeout=10

insmod part_gpt
insmod part_msdos
insmod ext2
insmod all_video
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod font
insmod png
insmod jpeg
insmod chain
insmod ntfs
insmod fat

# ---- Framebuffer mode -------------------------------------------------------
set gfxmode=1024x768x32,800x600x32,auto
set gfxpayload=keep

if loadfont /boot/grub/fonts/font.pf2 ; then
    terminal_output gfxterm
elif loadfont /boot/grub/fonts/unicode.pf2 ; then
    terminal_output gfxterm
elif loadfont unicode ; then
    terminal_output gfxterm
else
    terminal_output console
fi

if background_image /boot/themes/draco_bg.png ; then
    set color_normal=white/black
    set color_highlight=light-cyan/black
else
    set menu_color_normal=white/black
    set menu_color_highlight=black/light-cyan
fi

# ---- DracolaxOS entries -----------------------------------------------------

menuentry "DracolaxOS v1.0  [Graphical]" --class os {
    search --no-floppy --set=root --file /boot/kernel.elf
    set gfxpayload=9000x400x32
    multiboot2 /boot/kernel.elf mode=graphical
    boot
}

menuentry "DracolaxOS v1.0  [Live Session]" --class os {
    search --no-floppy --set=root --file /boot/kernel.elf
    set gfxpayload=1024x768x32
    # Live mode: installer runs but user can choose "Live Session"
    # which creates a temporary guest account without installing.
    multiboot2 /boot/kernel.elf mode=graphical live=1
    boot
}

menuentry "DracolaxOS v1.0  [800x600]" --class os {
    search --no-floppy --set=root --file /boot/kernel.elf
    set gfxpayload=800x600x32
    multiboot2 /boot/kernel.elf mode=graphical
    boot
}

menuentry "DracolaxOS v1.0  [Text mode]" --class os {
    search --no-floppy --set=root --file /boot/kernel.elf
    set gfxpayload=1024x768x32
    multiboot2 /boot/kernel.elf mode=text
    boot
}

menuentry "DracolaxOS v1.0  [Shell only]" --class os {
    search --no-floppy --set=root --file /boot/kernel.elf
    set gfxpayload=1024x768x32
    multiboot2 /boot/kernel.elf mode=shell
    boot
}

