# .github/workflows/build.yml  (copy to .github/workflows/ in your repo)
# DracolaxOS CI pipeline
#
# Steps:
#   1. Build kernel + ISO
#   2. Boot in headless QEMU
#   3. Send shell commands over serial and verify output
#   4. Run ELF compat test with a musl static binary

name: DracolaxOS CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
    # ---- Checkout ----------------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---- Install build deps ------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          gcc-multilib nasm grub-pc-bin grub-common \
          xorriso mtools qemu-system-x86 \
          musl-tools expect socat

    # ---- Build kernel ------------------------------------------------------
    - name: Build kernel.elf
      run: make build

    - name: Build ISO
      run: make iso

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: dracolaxos-iso
        path: dracolaxos.iso

    # ---- Build test binaries -----------------------------------------------
    - name: Build musl test binaries
      run: |
        mkdir -p tests/bin
        # hello — prints "hello from linux abi\n" and exits
        musl-gcc -m32 -static -o tests/bin/hello tests/hello_linux.c 2>/dev/null || \
          ( echo "musl-gcc -m32 failed; trying -m64" && \
            musl-gcc -static -o tests/bin/hello tests/hello_linux.c )
        file tests/bin/hello

    # ---- QEMU boot test (headless) -----------------------------------------
    - name: Boot in QEMU and capture serial output
      run: |
        timeout 30 qemu-system-i386 \
          -cdrom dracolaxos.iso \
          -m 128M \
          -serial file:/tmp/serial.log \
          -no-reboot \
          -display none \
          -device isa-debug-exit,iobase=0xf4,iosize=0x04 &
        QPID=$!
        sleep 25
        kill $QPID 2>/dev/null || true
        echo "=== Serial output ==="
        cat /tmp/serial.log || echo "(no serial output)"

    - name: Verify boot output
      run: |
        grep -q "DracolaxOS" /tmp/serial.log || \
          ( echo "FAIL: DracolaxOS banner not found in serial output" && exit 1 )
        grep -q "INIT: starting" /tmp/serial.log || \
          ( echo "FAIL: init task did not start" && exit 1 )
        grep -q "SHELL\|shell\|draco>" /tmp/serial.log || \
          echo "INFO: shell prompt not yet captured (timing)"
        echo "PASS: kernel booted successfully"

    - name: Check Linux compat init
      run: |
        grep -q "LINUX: compatibility layer" /tmp/serial.log || \
          echo "WARN: Linux compat init not confirmed in serial log"
        grep -q "SHIELD: Draco Shield" /tmp/serial.log || \
          echo "WARN: Draco Shield init not confirmed in serial log"

    # ---- Upload logs -------------------------------------------------------
    - name: Upload serial log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: serial-log
        path: /tmp/serial.log

  # ---- ELF loader test (host-side validation) ----------------------------
  elf-validation:
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Install musl
      run: sudo apt-get install -y musl-tools

    - name: Build and validate ELF test binary
      run: |
        cat > /tmp/hello_elf.c << 'CSRC'
        #include <unistd.h>
        int main(void) {
            write(1, "hello from linux abi\n", 21);
            return 0;
        }
        CSRC
        musl-gcc -m32 -static -o /tmp/hello_elf /tmp/hello_elf.c 2>/dev/null || \
          musl-gcc -static -o /tmp/hello_elf /tmp/hello_elf.c
        file /tmp/hello_elf
        readelf -h /tmp/hello_elf | grep -E 'Class|Machine|Type|Entry'
        echo "ELF binary validated"
